name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4    # обновлено с v3 на v4
      
      - name: Setup Python
        uses: actions/setup-python@v5  # обновлено с v4 на v5
        with:
          python-version: '3.11'       # изменено с 3.11 на 3.11 (оставили)
      
      - name: Install backend dependencies
        run: |
          cd safeplate-backend
          pip install -r requirements.txt
          pip install pytest
      
      - name: Run backend tests (optional)
        run: |
          cd safeplate-backend
          pytest -v || true   # Добавлено || true - тесты не блокируют
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install frontend dependencies
        run: |
          cd safeplate-frontend
          npm ci --legacy-peer-deps || true
      
      - name: Build frontend
        run: |
          cd safeplate-frontend
          npm run build || true